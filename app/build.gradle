plugins {
    // Plugins automatically generated by MLGradleWriter.kt
    alias(libs.plugins.android.application)
}

android {
    namespace 'com.a3mart.app'
    compileSdk 36
    
    def getGitHash = { ->
    try {
        def headFile = new File("${project.rootDir}/.git/HEAD")
        if (!headFile.exists()) return "No .git folder"
        
        def head = headFile.text.trim()
        if (head.startsWith("ref:")) {
            def refPath = head.substring(5).trim()
            def refFile = new File("${project.rootDir}/.git/${refPath}")
            if (refFile.exists()) {
                return refFile.text.trim().substring(0, 7) 
            } else {
                return "Unknown branch"
            }
        } else {
            return head.substring(0, 7)
        }
    } catch (Exception e) {
        return "Error: ${e.message}"
    }
}

   signingConfigs {
        release {
            storeFile file("signing-key.jks")
            storePassword "qwerty123"
            keyAlias "haydeKey"
            keyPassword "qwerty123"
        }
    }
    

    defaultConfig {
        applicationId 'com.a3mart.app'
        minSdk 21
        targetSdk 34
        versionCode 2
        versionName "1.1.0"

        renderscriptTargetApi 31
        renderscriptSupportModeEnabled true
        testInstrumentationRunner 'androidx.test.runner.AndroidJUnitRunner'
        buildConfigField "String", "GIT_HASH", "\"${getGitHash()}\""
        buildConfigField "String", "BUILD_TIME", "\"" + new Date().format('dd MMM yyyy, HH:mm') + "\""
    }
    
        buildTypes {
        release {
            minifyEnabled true
            signingConfig signingConfigs.release 
            
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    buildFeatures {
        viewBinding true
        buildConfig = true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

